<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ridal NAI Canvas</title>
    <link rel="stylesheet" href="index.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="dark-theme">
    <div class="app-container">
        
        <!-- Left Panel: Prompts -->
        <aside class="left-panel">
            <div class="panel-header">
                <h1 class="logo">Ridal <span>NAI 캔버스</span></h1>
                <div class="header-actions">
                    <button id="theme-toggle" class="icon-btn" title="Toggle Theme">☀️</button>
                    <button id="history-toggle" class="icon-btn" title="View History">📜</button>
                </div>
            </div>

            <div class="prompts-scroll-area">
                <div class="input-group prompt-group">
                <div class="label-row">
                    <label for="base-prompt">기본 프롬프트 (Base Prompt)</label>
                    <div class="prompt-actions">
                        <button class="prompt-action-btn copy-prompt-btn" data-target="base-prompt" title="복사">📋</button>
                        <button class="prompt-action-btn clear-prompt-btn" data-target="base-prompt" title="지우기">🗑️</button>
                        <label class="switch" title="태그 강조 색상 표시" style="margin-left: 8px;">
                            <input type="checkbox" id="highlight-toggle" checked>
                            <span class="slider round"></span>
                        </label>
                    </div>
                </div>
                <div class="prompt-container">
                    <div id="base-highlight" class="highlight-layer"></div>
                    <textarea id="base-prompt" rows="7" spellcheck="false" placeholder="예시: [Artist] artist:risi, [Positive] masterpiece, best quality..."></textarea>
                </div>
            </div>
            
            <div class="input-group prompt-group">
                <div class="label-row">
                    <label for="negative-prompt">부정 프롬프트 (Undesired Content)</label>
                    <div class="prompt-actions">
                        <button class="prompt-action-btn copy-prompt-btn" data-target="negative-prompt" title="복사">📋</button>
                        <button class="prompt-action-btn clear-prompt-btn" data-target="negative-prompt" title="지우기">🗑️</button>
                    </div>
                </div>
                <div class="prompt-container">
                    <div id="negative-highlight" class="highlight-layer"></div>
                    <textarea id="negative-prompt" rows="5" spellcheck="false" placeholder="예시: text, logo, watermark, lowres, bad anatomy..."></textarea>
                </div>
            </div>

            <div class="input-group prompt-group">
                <div class="label-row">
                    <label for="character-prompt">캐릭터 프롬프트 (Character Prompt)</label>
                    <div class="prompt-actions">
                        <button class="prompt-action-btn copy-prompt-btn" data-target="character-prompt" title="복사">📋</button>
                        <button class="prompt-action-btn clear-prompt-btn" data-target="character-prompt" title="지우기">🗑️</button>
                    </div>
                </div>
                <div class="prompt-container">
                    <div id="character-highlight" class="highlight-layer"></div>
                    <textarea id="character-prompt" rows="5" spellcheck="false" placeholder="예시: 1boy, 1girl, black hair, sharp features..."></textarea>
                </div>
            </div>

            <button id="generate-btn" class="primary-btn mt-auto" style="display: flex; flex-direction: column; align-items: center; gap: 4px;">
                <span class="btn-text">✨ 이미지 생성</span>
                <span id="cost-display" style="font-size: 11px; opacity: 0.8;">비용 계산 중...</span>
            </button>
        </aside>

        <!-- Center Panel: Image Result -->
        <main class="center-panel">
            <div id="image-container" class="image-container">
                <div class="empty-state">
                    <p>생성된 이미지가 여기에 표시됩니다</p>
                </div>
            </div>
            <button id="save-btn" class="secondary-btn" style="display: none; position: absolute; bottom: 20px; right: 20px; z-index: 50;">💾 이미지 저장</button>
        </main>

        <!-- Right Panel: Settings -->
        <aside class="right-panel">
            <div class="settings-section">
                <div class="label-row" style="margin-bottom: 8px;">
                    <h3>🔑 시스템 (System)</h3>
                    <div id="anlas-display" style="font-size: 13px; font-weight: 700; color: var(--accent-color); display: flex; align-items: center; gap: 4px;">
                        🪙 Anlas: -
                    </div>
                </div>
                <div class="input-group">
                    <label for="api-key">API 키</label>
                    <input type="password" id="api-key" placeholder="pst-xxxxxxxx...">
                </div>
            </div>

            <div class="settings-section">
                <h3>⚙️ 모델 설정 (Model)</h3>
                <div class="input-group">
                    <label for="model-select">사용할 모델</label>
                    <select id="model-select">
                        <option value="nai-diffusion-4-5-full" selected>NAI Diffusion V4.5 Full</option>
                        <option value="nai-diffusion-4-5-curated">NAI Diffusion V4.5 Curated</option>
                        <option value="nai-diffusion-4-full">NAI Diffusion V4 Full</option>
                        <option value="nai-diffusion-3">NAI Diffusion V3 (Curated/Full)</option>
                    </select>
                </div>
                <div class="input-group">
                    <label for="resolution-select">해상도 (Resolution)</label>
                    <select id="resolution-select">
                        <optgroup label="Normal">
                            <option value="832x1216">Portrait (832x1216)</option>
                            <option value="1216x832">Landscape (1216x832)</option>
                            <option value="1024x1024">Square (1024x1024)</option>
                        </optgroup>
                        <optgroup label="Large">
                            <option value="1024x1536">Large Portrait (1024x1536)</option>
                            <option value="1536x1024">Large Landscape (1536x1024)</option>
                            <option value="1472x1472">Large Square (1472x1472)</option>
                        </optgroup>
                        <optgroup label="Wallpaper">
                            <option value="1920x1088">Wallpaper (1920x1088)</option>
                        </optgroup>
                    </select>
                </div>
            </div>

            <div class="settings-section">
                <h3>🎛️ 생성 설정 (Generation)</h3>
                <div class="input-group">
                    <div class="slider-group">
                        <div class="slider-header">
                            <label for="steps">스텝 수 (Steps)</label>
                            <span id="steps-val">28</span>
                        </div>
                        <input type="range" id="steps" min="1" max="50" value="28">
                    </div>
                </div>

                <div class="input-group">
                    <div class="slider-group">
                        <div class="slider-header">
                            <label for="scale">가중치 스케일 (Guidance)</label>
                            <span id="scale-val">5.0</span>
                        </div>
                        <input type="range" id="scale" min="1" max="10" step="0.1" value="5.0">
                    </div>
                </div>

                <div class="input-group">
                    <div class="slider-group">
                        <div class="slider-header">
                            <label for="rescale">가중치 리스케일 (Rescale)</label>
                            <span id="rescale-val">0</span>
                        </div>
                        <input type="range" id="rescale" min="0" max="1" step="0.01" value="0">
                    </div>
                </div>

                <div class="input-group">
                    <label for="sampler">샘플러 (Sampler)</label>
                    <select id="sampler">
                        <option value="k_euler">Euler</option>
                        <option value="k_euler_ancestral" selected>Euler Ancestral</option>
                        <option value="k_dpmpp_2s_ancestral">DPM++ 2S Ancestral</option>
                        <option value="k_dpmpp_2m">DPM++ 2M</option>
                    </select>
                </div>
                
                <div class="input-group">
                    <label for="seed">시드 (Seed)</label>
                    <input type="number" id="seed" placeholder="빈칸이면 랜덤 생성">
                </div>
            </div>

            <div class="settings-section">
                <h3><span class="icon">🔧</span> Advanced</h3>
                <div class="input-group">
                    <label for="noise-schedule">노이즈 스케줄 (Noise Schedule)</label>
                    <select id="noise-schedule">
                        <option value="native">Native</option>
                        <option value="karras" selected>Karras</option>
                        <option value="exponential">Exponential</option>
                        <option value="polyexponential">Polyexponential</option>
                    </select>
                </div>
                
                <div class="checkbox-group mt-1">
                    <input type="checkbox" id="add-quality" checked>
                    <label for="add-quality" style="display:inline; padding-left: 6px;">고품질 태그 추가 (Add Quality Tags)</label>
                </div>
                
                <div class="input-group mt-1">
                    <label for="undesired-content">부정 프롬프트 프리셋 (UC Preset)</label>
                    <select id="undesired-content">
                        <option value="heavy">Heavy (권장)</option>
                        <option value="light">Light</option>
                        <option value="none">None</option>
                    </select>
                </div>
            </div>
        </aside>
    </div>

    <!-- Modals -->
    <div id="history-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>생성 기록 (History)</h2>
                <button class="close-btn" id="close-history">&times;</button>
            </div>
            <div class="modal-body" id="history-gallery">
                <!-- History items will be populated here -->
            </div>
        </div>
    </div>

    <div id="lightbox-modal" class="modal" style="z-index: 200; flex-direction: column; gap: 16px;">
        <span class="close-btn" id="close-lightbox" style="position: absolute; top: 20px; right: 30px; font-size: 40px; color: white;">&times;</span>
        <img id="lightbox-img" style="max-width: 90%; max-height: 65%; object-fit: contain; box-shadow: 0 0 30px rgba(0,0,0,0.8); border-radius: 8px;">
        <div id="lightbox-prompt" style="color: white; max-width: 90%; width: 800px; background: rgba(0,0,0,0.8); padding: 20px; border-radius: 8px; font-size: 13px; line-height: 1.5; overflow-y: auto; max-height: 30%; display: flex; flex-direction: column; gap: 12px; cursor: text;"></div>
    </div>

    <script>
        console.log('HTML loaded, attempting to load renderer.js...');
    </script>
    <script src="renderer.js?v=2"></script>
</body>
</html>
